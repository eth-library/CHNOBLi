services:
  linking:
    #image: registry.ethz.ch/library/adl/nla/linking:v1.1
    image: linking:v0.1
    container_name: linking
    build:
      context: .
      dockerfile: services/linking/Dockerfile
      secrets:
        - adl_key
    user: "${UID}:${GID}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all # Or specify a number like 1
              capabilities: [gpu]
    environment:
      - USER=${USER}
      - PATH_TO_CA_CERT=/certs/ca.crt
      - TZ=Europe/Zurich
    env_file:
      - .env
    volumes:
      - ./private/input:/app/nla/data/input
      - ./private/output:/app/nla/data/output
      - ./private/logs:/app/nla/logs
      - ${PATH_TO_CA_CERT}:/certs/ca.crt:ro
secrets:
  adl_key:
    file: ./services/linking/deployment_key/adl_key
