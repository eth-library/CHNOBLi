services:
  linking:
    image: linking:v0.1
    container_name: chnobli-linking
    hostname: nla
    user: "${UID:-1000}:${GID:-1000}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all # Or specify a number like 1
              capabilities: [gpu]
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - USER=${USER:-appuser}
      - PATH_TO_OUTFILE_FOLDER=/app/chnobli/nla/data/output
      - PATH_TO_CA_CERT=/certs/ca.crt
      - TZ=Europe/Zurich
      - USE_RICH_LOGGING=false
    volumes:
      - ./private/input:/app/chnobli/nla/data/input
      - ./private/output:/app/chnobli/nla/data/output
      - ./private/logs:/app/chnobli/nla/logs
      - ${PATH_TO_CA_CERT}:/certs/ca.crt:ro
